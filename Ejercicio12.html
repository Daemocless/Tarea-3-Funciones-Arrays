    <script>
      const edades = [31, 5, 18, 42, 7, 23];
      const frutas = ["mango", "apple", "kiwi", "banana"];
      const edadesOrden = [...edades].sort(((a, b) => a - b));
      const frutasOrden = [...frutas].sort((a, b) => a.localeCompare(b));
      console.log(edadesOrden);
      console.log(frutasOrden);
    </script>
