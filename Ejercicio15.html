<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
  </head>

  <body>
    <header>
      <p id="resumen"></p>
    </header>

    <script>
      const usuarios = [
        { nombre: "Ana", roles: ["admin", "editor"] },
        { nombre: "Luis", roles: ["user"] },
        { nombre: "Marta", roles: ["editor", "user"] },
        { nombre: "Carlos", roles: ["admin"] },
      ];
      usuarios.forEach((usuario) => {
        const puedeAcceder = usuario.roles.includes("admin");
        const mensaje = puedeAcceder ? "Acceso permitido" : "Acceso denegado";
        console.log(mensaje);
      });
    </script>
  </body>
</html>
