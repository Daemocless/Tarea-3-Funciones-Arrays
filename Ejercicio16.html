<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
  </head>

  <body>
    <header>
      <p id="resumen"></p>
    </header>

    <script>
      const pedidos = [
        { id: "P01", importe: 45.0, entregado: true },
        { id: "P02", importe: 120.0, entregado: false },
        { id: "P03", importe: 33.5, entregado: true },
        { id: "P04", importe: 89.0, entregado: true },
        { id: "P05", importe: 15.0, entregado: false },
      ];

      pedidos
        .filter((pedido) => pedido.entregado)

        .map((pedido) => ({ ...pedido, importeConIVA: pedido.importe * 1.21 }))

        .sort((a, b) => b.importeConIVA - a.importeConIVA)

        .forEach((pedido) => {
          console.log(`${pedido.id} → ${pedido.importeConIVA.toFixed(2)} €`);
        });
    </script>
  </body>
</html>
